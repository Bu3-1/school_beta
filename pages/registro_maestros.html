<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruta Bigotes · Registro de maestros</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="auth-shell">
  <div class="auth-card wide">
    <div class="auth-brand">
      <img src="assets/bookie-face.png" alt="">
      <div>
        <h1>Crea tu cuenta</h1>
        <span class="tag">Panel de maestros</span>
      </div>
    </div>
    <p class="auth-subtitle">Regístrate para crear tus grupos y seguir el progreso de cada alumno.</p>

    <form autocomplete="off">
      <div class="field-row">
        <div class="field">
          <label for="nombre">Nombre completo</label>
          <div class="input-wrap">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="#9eb6c2" stroke-width="2"/><path d="M4 20c0-4 3.5-6 8-6s8 2 8 6" stroke="#9eb6c2" stroke-width="2" stroke-linecap="round"/></svg>
            <input id="nombre" type="text" placeholder="Tu nombre">
          </div>
        </div>
        <div class="field">
          <label for="institucion">Institución / escuela</label>
          <div class="input-wrap">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 21V9l8-5 8 5v12" stroke="#9eb6c2" stroke-width="2" stroke-linejoin="round"/><path d="M9 21v-6h6v6" stroke="#9eb6c2" stroke-width="2" stroke-linejoin="round"/></svg>
            <input id="institucion" type="text" placeholder="Nombre de la escuela">
          </div>
        </div>
      </div>

      <div class="field">
        <label for="correo">Correo institucional</label>
        <div class="input-wrap">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 6h16v12H4V6Z" stroke="#9eb6c2" stroke-width="2" stroke-linejoin="round"/><path d="m4 7 8 6 8-6" stroke="#9eb6c2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <input id="correo" type="email" placeholder="tu.nombre@escuela.edu">
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="clave">Contraseña</label>
          <div class="input-wrap">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="3" stroke="#9eb6c2" stroke-width="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="#9eb6c2" stroke-width="2" stroke-linecap="round"/></svg>
            <input id="clave" type="password" placeholder="Crea una contraseña">
          </div>
        </div>
        <div class="field">
          <label for="clave2">Confirmar contraseña</label>
          <div class="input-wrap">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="3" stroke="#9eb6c2" stroke-width="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="#9eb6c2" stroke-width="2" stroke-linecap="round"/></svg>
            <input id="clave2" type="password" placeholder="Repite la contraseña">
          </div>
        </div>
      </div>

      <label class="check-row">
        <input type="checkbox">
        Acepto los términos de uso y el manejo de datos de mis alumnos conforme a la política de privacidad.
      </label>

      <button type="submit" class="btn btn-primary btn-block">Crear cuenta</button>
    </form>

    <p class="auth-foot">¿Ya tienes cuenta? <a href="login-maestros.html">Inicia sesión</a></p>
  </div>
</main>

</body>
</html>
