<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruta Bigotes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@500;600;700&display=swap');

  :root{
    /* paleta "Esquema 3 – mundo susurrante" */
    --bg-1: #f5f3f2;       /* tinte muy claro de FN.01.81, fondo */
    --bg-2: #e9e6e4;       /* FN.01.81 suavizado */
    --card: #ffffff;
    --ink: #4a4853;        /* V7.11.16, texto principal */
    --ink-soft: #8f8e94;   /* TN.02.54, texto secundario */
    --lilac: #bebcc7;      /* V2.06.69, acento decorativo suave */
    --teal: #c8d5d5;       /* N9.07.78, acento frío suave */
    --sage: #899eb3;       /* T4.16.56, botón / acción principal */
    --sage-dark: #6f8299;  /* T4.16.56 oscurecido, para contraste AA */
    --olive: #cbcfb4;      /* J3.11.76, pop de color puntual */
    --sand: #9eb6c2;       /* R6.14.65, detalle cálido-frío */
    --line: #ded9d7;       /* bordes, derivado de FN.01.81 */
    --focus: #6f8299;      /* foco de accesibilidad, mismo tono del botón */
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0;
    height:100%;
    font-family: 'Quicksand', sans-serif;
    color: var(--ink);
  }

  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 12% 18%, rgba(190,188,199,0.30) 0, transparent 40%),
      radial-gradient(circle at 88% 82%, rgba(137,158,179,0.20) 0, transparent 45%),
      linear-gradient(160deg, var(--bg-1), var(--bg-2));
    padding: 32px 20px;
    overflow-x:hidden;
  }

  /* --- estrellitas de fondo, muy sutiles, sin parpadeo agresivo --- */
  .sky{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
  }
  .sky span{
    position:absolute;
    background: var(--lilac);
    border-radius:50%;
    opacity:.35;
    animation: float 7s ease-in-out infinite;
  }
  @media (prefers-reduced-motion: reduce){
    .sky span{ animation: none; }
  }
  @keyframes float{
    0%,100%{ transform: translateY(0); opacity:.35;}
    50%{ transform: translateY(-10px); opacity:.6;}
  }

  .stage{
    position:relative;
    z-index:1;
    width:100%;
    max-width: 980px;
    display:grid;
    grid-template-columns: 1.05fr 1fr;
    align-items:center;
    gap: 20px;
  }

  /* ---------- lado izquierdo: mascota + globo ---------- */
  .companion{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:18px;
    padding: 10px 20px;
  }

  .bubble{
    background: var(--card);
    border-radius: 22px;
    padding: 14px 22px;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size: clamp(1rem, 2.6vw, 1.15rem);
    color: var(--ink);
    box-shadow: 0 10px 24px rgba(90,90,140,0.08);
    position:relative;
    max-width: 320px;
    width: fit-content;
    animation: bob 4.5s ease-in-out infinite;
  }
  .bubble::after{
    content:"";
    position:absolute;
    bottom:-14px;
    left:50%;
    transform: translateX(-50%);
    border-width: 14px 12px 0 12px;
    border-style: solid;
    border-color: var(--card) transparent transparent transparent;
  }
  @media (prefers-reduced-motion: reduce){ .bubble{ animation:none; } }
  @keyframes bob{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-6px); }
  }

  .companion img{
    width: min(340px, 78vw);
    filter: drop-shadow(0 18px 26px rgba(90,90,140,0.16));
  }

  /* ---------- tarjeta de acceso ---------- */
  .card{
    background: var(--card);
    border-radius: 32px;
    padding: 40px 38px 34px;
    box-shadow: 0 24px 50px rgba(90,90,140,0.14);
    position:relative;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom: 6px;
  }
  .brand img{
    width:52px;
    height:52px;
    border-radius:50%;
    background: var(--sand);
    padding:4px;
    object-fit:cover;
  }
  .brand h1{
    font-family:'Baloo 2', sans-serif;
    font-size: clamp(1.35rem, 4vw, 1.7rem);
    letter-spacing: .5px;
    margin:0;
    color: var(--ink);
  }

  .subtitle{
    margin: 0 0 26px;
    color: var(--ink-soft);
    font-weight:600;
    font-size: .98rem;
  }

  label{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size: .82rem;
    letter-spacing:.4px;
    color:#6c6c92;
    text-transform: uppercase;
    margin-bottom:8px;
  }

  .field{ margin-bottom: 20px; }

  .input-wrap{
    display:flex;
    align-items:center;
    gap:10px;
    border: 2px solid var(--line);
    border-radius: 16px;
    padding: 12px 16px;
    background:#fbfbfe;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .input-wrap svg{ flex-shrink:0; }

  .input-wrap:focus-within{
    border-color: var(--focus);
    box-shadow: 0 0 0 4px rgba(111,130,153,0.18);
  }

  input{
    border:0;
    outline:0;
    background:transparent;
    width:100%;
    font-family:'Quicksand', sans-serif;
    font-weight:600;
    font-size: 1.05rem;
    color: var(--ink);
  }
  input::placeholder{ color:#b7b7cc; font-weight:600; }

  button.cta{
    width:100%;
    border:0;
    cursor:pointer;
    background: linear-gradient(135deg, var(--sage), var(--sage-dark));
    color:#fff;
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:1.2rem;
    letter-spacing:.5px;
    padding: 16px;
    border-radius: 18px;
    margin-top: 6px;
    box-shadow: 0 12px 22px rgba(111,130,153,0.35);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  button.cta:hover{ transform: translateY(-2px); box-shadow: 0 16px 26px rgba(111,130,153,0.4); }
  button.cta:focus-visible{ outline: 3px solid var(--focus); outline-offset:3px; }
  button.cta:active{ transform: translateY(0); }

  .help{
    display:block;
    text-align:center;
    margin-top: 18px;
    color: var(--ink-soft);
    text-decoration:none;
    font-weight:600;
    font-size:.92rem;
    border-bottom: 1px dashed transparent;
  }
  .help:hover, .help:focus-visible{ color: var(--ink); border-color: var(--lilac); }

  @media (max-width: 820px){
    .stage{ grid-template-columns: 1fr; gap: 6px; }
    .companion{ order:1; padding-bottom:0; gap:14px; }
    .card{ order:2; width:100%; }
    .companion img{ width: min(230px, 55vw); }
  }

  @media (max-width: 420px){
    body{ padding: 20px 14px; }
    .card{ padding: 30px 22px 26px; border-radius: 26px; }
    .brand img{ width:44px; height:44px; }
    .bubble{ padding: 12px 18px; }
    .companion img{ width: min(190px, 60vw); }
    label{ font-size: .76rem; }
    input{ font-size: 1rem; }
    button.cta{ font-size: 1.08rem; padding: 14px; }
  }

  @media (max-height: 620px) and (max-width: 820px){
    .companion img{ width: 140px; }
    .bubble{ font-size: .95rem; padding: 10px 16px; }
  }
</style>
</head>
