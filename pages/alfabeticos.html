<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Index Principal</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #FDF5E6, #bce1ad); /* fondo azul */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      width: 600px;
    }

    .btn {
      background-color: 	#ebaaf5; /* verde sage */
      color: rgb(0, 0, 0);
      font-size: 60px;
      padding: 90px;
      
      text-align: center;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
      
    }

    .btn:hover {
      background-color: #9ba9b5; /* azul teal */
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="btn" onclick="location.href='escritura_alfabetica.html'">Escritura</div>
    <div class="btn" onclick="location.href='lectura_alfabetica.html'">Lectura</div>
    <div class="btn" onclick="location.href='comprension_lectora_alfabetica.html'">Comprensión Lectora</div>
  </div>
</body>
</html>
