<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escritura Alfabética</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff8f0; min-height: 100vh; padding: 32px 24px; }

  .page-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .page-header h1 { font-size: 22px; font-weight: 700; color: #333; }
  .page-subtitle { font-size: 14px; color: #666; margin-bottom: 28px; }

  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-right: 8px; }
  .badge-level { background: #ffe0b2; color: #bf6a00; }
  .badge-inst  { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
  .badge-num   { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; border: 2px solid currentColor; font-size: 11px; font-weight: 700; }

  .section { margin-bottom: 32px; }
  .section-label { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }

  /* ① Completa la palabra */
  .words-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px 16px; }
  .word-card { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .word-emoji { font-size: 48px; line-height: 1; }
  .word-boxes { display: flex; align-items: center; gap: 3px; font-size: 22px; font-weight: 700; color: #444; font-family: 'Courier New', monospace; letter-spacing: 1px; }
  .letter-box { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 32px; border-bottom: 3px solid #bbb; font-size: 22px; }
  .letter-blank { border-bottom: 3px solid #f4a300; color: transparent; }
  .letter-input { width: 28px; height: 32px; border: none; border-bottom: 3px solid #f4a300; background: transparent; text-align: center; font-size: 22px; font-weight: 700; color: #e65100; outline: none; font-family: 'Courier New', monospace; padding: 0; }
  .letter-input:focus { border-bottom-color: #e65100; }

  /* ② Une la letra con la imagen */
  .match-container { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .match-col { display: flex; flex-direction: column; gap: 18px; }
  .match-letter { display: flex; align-items: center; justify-content: center; width: 56px; height: 56px; border-radius: 12px; background: #fff3e0; border: 2px solid #ffcc80; font-size: 28px; font-weight: 700; color: #bf6a00; cursor: pointer; transition: background 0.2s; user-select: none; }
  .match-letter:hover, .match-letter.selected { background: #ffe0b2; border-color: #f4a300; }
  .match-letter.matched { background: #e8f5e9; border-color: #66bb6a; color: #2e7d32; }
  .match-image { display: flex; align-items: center; justify-content: center; width: 68px; height: 68px; border-radius: 12px; background: #fff; border: 2px dashed #ccc; font-size: 38px; cursor: pointer; transition: border-color 0.2s; }
  .match-image:hover { border-color: #f4a300; }
  .match-image.matched { border: 2px solid #66bb6a; background: #e8f5e9; }
  .match-lines { flex: 1; position: relative; min-width: 60px; }
  svg.lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }

  /* ③ Escribe la palabra */
  .write-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
  .write-card { background: #fff; border: 1.5px solid #ffe0b2; border-radius: 14px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .write-emoji { font-size: 44px; }
  .write-input { width: 100%; border: none; border-bottom: 2.5px solid #f4a300; background: transparent; text-align: center; font-size: 20px; font-weight: 600; color: #444; outline: none; padding: 4px 0; font-family: 'Segoe UI', Arial, sans-serif; }
  .write-input::placeholder { color: #ccc; font-weight: 400; }
  .write-input:focus { border-bottom-color: #e65100; }

  /* Check button */
  .check-btn { display: block; margin: 8px auto 0; padding: 10px 28px; border-radius: 22px; border: none; background: #f4a300; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
  .check-btn:hover { background: #e65100; }
  .feedback { text-align: center; font-size: 14px; font-weight: 600; margin-top: 6px; min-height: 20px; }
  .feedback.correct { color: #2e7d32; }
  .feedback.wrong   { color: #c62828; }
</style>
</head>
<body>

<div class="page-header">
  <span style="font-size:24px;">✏️</span>
  <h1>Escritura alfabética</h1>
</div>
<p class="page-subtitle">Practica escribir letras y palabras completas.</p>

<div style="margin-bottom:20px;">
  <span class="badge badge-level">⭐ Nivel: Alfabético</span>
  <span class="badge badge-inst"><span class="badge-num">①</span> Completa la letra que falta</span>
</div>

<!-- SECCIÓN 1: Completa la letra -->
<div class="section">
  <div class="words-grid" id="grid1">
    <!-- palabra: GATO -->
    <div class="word-card">
      <span class="word-emoji">🐱</span>
      <div class="word-boxes">
        <span class="letter-box">g</span>
        <input class="letter-input" maxlength="1" data-answer="a" placeholder="_">
        <span class="letter-box">t</span>
        <span class="letter-box">o</span>
      </div>
    </div>
    <!-- palabra: LUNA -->
    <div class="word-card">
      <span class="word-emoji">🌙</span>
      <div class="word-boxes">
        <span class="letter-box">l</span>
        <span class="letter-box">u</span>
        <input class="letter-input" maxlength="1" data-answer="n" placeholder="_">
        <span class="letter-box">a</span>
      </div>
    </div>
    <!-- palabra: PATO -->
    <div class="word-card">
      <span class="word-emoji">🦆</span>
      <div class="word-boxes">
        <input class="letter-input" maxlength="1" data-answer="p" placeholder="_">
        <span class="letter-box">a</span>
        <span class="letter-box">t</span>
        <span class="letter-box">o</span>
      </div>
    </div>
    <!-- palabra: MESA -->
    <div class="word-card">
      <span class="word-emoji">🪑</span>
      <div class="word-boxes">
        <span class="letter-box">m</span>
        <span class="letter-box">e</span>
        <input class="letter-input" maxlength="1" data-answer="s" placeholder="_">
        <span class="letter-box">a</span>
      </div>
    </div>
    <!-- palabra: NIDO -->
    <div class="word-card">
      <span class="word-emoji">🪺</span>
      <div class="word-boxes">
        <span class="letter-box">n</span>
        <span class="letter-box">i</span>
        <input class="letter-input" maxlength="1" data-answer="d" placeholder="_">
        <span class="letter-box">o</span>
      </div>
    </div>
    <!-- palabra: ROSA -->
    <div class="word-card">
      <span class="word-emoji">🌹</span>
      <div class="word-boxes">
        <span class="letter-box">r</span>
        <span class="letter-box">o</span>
        <input class="letter-input" maxlength="1" data-answer="s" placeholder="_">
        <span class="letter-box">a</span>
      </div>
    </div>
  </div>
  <button class="check-btn" onclick="checkSection1()">Revisar ✓</button>
  <p class="feedback" id="fb1"></p>
</div>

<hr style="border:none;border-top:1.5px solid #ffe0b2;margin:8px 0 24px;">

<div style="margin-bottom:20px;">
  <span class="badge badge-inst"><span class="badge-num">②</span> Escribe el nombre de cada imagen</span>
</div>

<!-- SECCIÓN 2: Escribe la palabra -->
<div class="section">
  <div class="write-grid">
    <div class="write-card">
      <span class="write-emoji">🐶</span>
      <input class="write-input" type="text" placeholder="escribe aquí..." data-answer="perro">
    </div>
    <div class="write-card">
      <span class="write-emoji">🌞</span>
      <input class="write-input" type="text" placeholder="escribe aquí..." data-answer="sol">
    </div>
    <div class="write-card">
      <span class="write-emoji">🍎</span>
      <input class="write-input" type="text" placeholder="escribe aquí..." data-answer="manzana">
    </div>
    <div class="write-card">
      <span class="write-emoji">🏠</span>
      <input class="write-input" type="text" placeholder="escribe aquí..." data-answer="casa">
    </div>
  </div>
  <button class="check-btn" onclick="checkSection2()">Revisar ✓</button>
  <p class="feedback" id="fb2"></p>
</div>

<script>
function normalize(s){ return s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }

function checkSection1(){
  const inputs = document.querySelectorAll('#grid1 .letter-input');
  let correct=0;
  inputs.forEach(inp=>{
    const ans = normalize(inp.value);
    const exp = inp.dataset.answer;
    if(ans===exp){ inp.style.color='#2e7d32'; correct++; }
    else { inp.style.color='#c62828'; }
  });
  const fb=document.getElementById('fb1');
  if(correct===inputs.length){ fb.textContent='¡Muy bien! Todas correctas 🎉'; fb.className='feedback correct'; }
  else { fb.textContent=`${correct} de ${inputs.length} correctas. ¡Inténtalo de nuevo!`; fb.className='feedback wrong'; }
}

function checkSection2(){
  const inputs = document.querySelectorAll('.write-grid .write-input');
  let correct=0;
  inputs.forEach(inp=>{
    const ans=normalize(inp.value);
    const exp=inp.dataset.answer;
    if(ans===exp){ inp.style.borderBottomColor='#66bb6a'; inp.style.color='#2e7d32'; correct++; }
    else { inp.style.borderBottomColor='#c62828'; inp.style.color='#c62828'; }
  });
  const fb=document.getElementById('fb2');
  if(correct===inputs.length){ fb.textContent='¡Excelente! ¡Lo lograste! 🌟'; fb.className='feedback correct'; }
  else { fb.textContent=`${correct} de ${inputs.length} correctas. ¡Sigue intentando!`; fb.className='feedback wrong'; }
}
</script>
</body>
</html>
