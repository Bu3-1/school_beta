<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aula Feliz — Actividades</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="pagina">

  <div class="barra-superior">
    <a href="alumnos.html" class="barra-superior__marca">
      <span class="barra-superior__logo">📖</span>
      Aula Feliz
    </a>
    <div class="barra-superior__usuario">MP</div>
  </div>

  <div class="contenido">

    <div id="fichaAlumno" class="fila margen-abajo-chico"></div>

    <div class="fila margen-abajo-mediano">
      <span id="badgeNivel" class="badge"></span>
      <h1 class="contenido__titulo" style="margin:0;">¿Qué actividad quieres trabajar?</h1>
    </div>

    <div id="listaActividades" class="grid-actividades"></div>

    <p style="margin-top:24px;">
      <a id="linkVolver" href="alumnos.html">&larr; Volver a selección de nivel</a>
    </p>

  </div>

</div>

<script src="js/datos.js"></script>
<script>
  const idAlumno = obtenerParametro('id');
  const nivel = obtenerParametro('nivel');
  const alumno = buscarAlumno(idAlumno);

  const ACTIVIDADES = [
    { nombre: "Lectura",             descripcion: "Reconocimiento y lectura de palabras de este nivel" },
    { nombre: "Escritura",           descripcion: "Formación y trazo de palabras" },
    { nombre: "Comprensión lectora", descripcion: "Interpretación de oraciones o relatos cortos" }
  ];

  if (alumno) {
    document.getElementById('fichaAlumno').innerHTML = `
      <div class="avatar avatar-chico" style="background:${alumno.color};">${alumno.iniciales}</div>
      <p class="texto-chico" style="margin:0;">${alumno.nombre} · ${alumno.grupo}</p>
    `;
  }

  document.getElementById('badgeNivel').textContent = nivel;
  document.getElementById('badgeNivel').style.background = (ESTILO_NIVEL[nivel] || {}).fondo || '#eee';
  document.getElementById('badgeNivel').style.color = (ESTILO_NIVEL[nivel] || {}).texto || '#333';

  document.getElementById('linkVolver').href = `nivel.html?id=${idAlumno}`;

  document.getElementById('listaActividades').innerHTML = ACTIVIDADES.map(act => {
    const estilo = ESTILO_ACTIVIDAD[act.nombre];
    return `
      <button
        class="tarjeta tarjeta-seleccionable"
        style="padding:24px 18px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:12px;"
        onclick="window.location.href='reportes.html?id=${idAlumno}'"
      >
        <div class="tarjeta-icono" style="width:56px; height:56px; border-radius:16px; background:${estilo.fondo}; color:${estilo.texto}; font-size:24px;">
          ${estilo.icono}
        </div>
        <div>
          <p style="font-size:15px; font-weight:600; margin:0 0 4px;">${act.nombre}</p>
          <p style="font-size:12px; color:var(--color-marron); margin:0;">${act.descripcion}</p>
        </div>
      </button>
    `;
  }).join('');
</script>

</body>
</html>
