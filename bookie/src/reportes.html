<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aula Feliz — Reportes</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="pagina">

  <div class="barra-superior">
    <a href="alumnos.html" class="barra-superior__marca">
      <span class="barra-superior__logo">📖</span>
      Aula Feliz
    </a>
    <div class="barra-superior__usuario">MP</div>
  </div>

  <div class="contenido">

    <h1 class="contenido__titulo">Reporte de alumno</h1>
    <p class="contenido__subtitulo">Avance por intento en cada actividad</p>

    <div id="fichaAlumno" class="tarjeta espacio-entre" style="padding:14px 16px; margin-bottom:20px;"></div>

    <div id="listaReportes" style="display:flex; flex-direction:column; gap:14px;"></div>

    <p style="margin-top:24px;">
      <a href="alumnos.html">&larr; Volver a la lista de alumnos</a>
    </p>

  </div>

</div>

<script src="js/datos.js"></script>
<script>
  const idAlumno = obtenerParametro('id');
  const alumno = buscarAlumno(idAlumno) || ALUMNOS[0]; // si no viene id, muestra el primero

  document.getElementById('fichaAlumno').innerHTML = `
    <div class="fila">
      <div class="avatar" style="background:${alumno.color};">${alumno.iniciales}</div>
      <div>
        <p style="font-size:14px; font-weight:600; margin:0;">${alumno.nombre}</p>
        <p style="font-size:12px; color:var(--color-marron); margin:0;">${alumno.grupo} · ${alumno.nivel}</p>
      </div>
    </div>
    <span class="badge ${ESTILO_ESTADO[alumno.estado].clase}">${alumno.estado}</span>
  `;

  function filaDeIntentos(intentos) {
    return intentos.map((intento, i) => {
      const esUltimo = i === intentos.length - 1;
      const color = esUltimo ? 'var(--color-vino)' : 'var(--color-gris-pizarra)';
      return `
        <div class="fila">
          <p style="font-size:12px; color:var(--color-marron); margin:0; width:66px;">Intento ${intento.intento}</p>
          <div class="progreso" style="flex:1;">
            <div class="progreso__relleno" style="width:${intento.puntos}%; background:${color};"></div>
          </div>
          <p style="font-size:12px; margin:0; width:28px; text-align:right; ${esUltimo ? 'font-weight:600; color:var(--color-negro);' : 'color:var(--color-marron);'}">
            ${intento.puntos}
          </p>
        </div>
      `;
    }).join('');
  }

  function badgeAvance(intentos) {
    const primero = intentos[0].puntos;
    const ultimo = intentos[intentos.length - 1].puntos;
    const diferencia = ultimo - primero;
    if (diferencia > 0) {
      return `<span class="badge badge-bien" style="margin-left:auto;">▲ +${diferencia} pts</span>`;
    } else if (diferencia < 0) {
      return `<span class="badge badge-atencion" style="margin-left:auto;">▼ ${diferencia} pts</span>`;
    }
    return `<span class="badge badge-progreso" style="margin-left:auto;">sin cambio</span>`;
  }

  document.getElementById('listaReportes').innerHTML = Object.entries(alumno.reportes).map(([actividad, intentos]) => {
    const estilo = ESTILO_ACTIVIDAD[actividad];
    return `
      <div class="tarjeta" style="padding:16px 18px;">
        <div class="fila margen-abajo-mediano">
          <div class="tarjeta-icono" style="width:32px; height:32px; border-radius:8px; background:${estilo.fondo}; color:${estilo.texto}; font-size:15px;">
            ${estilo.icono}
          </div>
          <p style="font-size:14px; font-weight:600; margin:0;">${actividad}</p>
          ${badgeAvance(intentos)}
        </div>
        <div style="display:flex; flex-direction:column; gap:8px;">
          ${filaDeIntentos(intentos)}
        </div>
      </div>
    `;
  }).join('');
</script>

</body>
</html>
