<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aula Feliz — Crear cuenta</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="division">

  <!-- Panel izquierdo: formulario -->
  <div class="division__formulario">
    <div class="division__formulario-interior">

      <h1 class="contenido__titulo">Crea tu cuenta</h1>
      <p class="contenido__subtitulo">Regístrate como maestra o maestro</p>

      <form id="formRegistro">
        <div class="campo">
          <label class="campo__etiqueta" for="nombre">Nombre completo</label>
          <input class="campo__input" type="text" id="nombre" placeholder="Paula Martínez" required>
        </div>

        <div class="campo">
          <label class="campo__etiqueta" for="correo">Correo electrónico</label>
          <input class="campo__input" type="email" id="correo" placeholder="nombre@escuela.edu" required>
        </div>

        <div class="campo">
          <label class="campo__etiqueta" for="escuela">Escuela</label>
          <input class="campo__input" type="text" id="escuela" placeholder="Nombre de tu escuela" required>
        </div>

        <div class="campo margen-abajo-mediano">
          <label class="campo__etiqueta" for="contrasena">Contraseña</label>
          <input class="campo__input" type="password" id="contrasena" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primario btn-ancho-completo">Crear cuenta</button>
      </form>

      <p class="texto-chico texto-centrado margen-arriba-mediano">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </p>

    </div>
  </div>

  <!-- Panel derecho: logo y marca -->
  <div class="division__marca">
    <div class="division__logo">📖</div>
    <p class="division__nombre">Aula Feliz</p>
    <p class="division__descripcion margen-abajo-mediano">Únete a la comunidad de maestros que acompañan a sus estudiantes de cerca</p>

    <div class="fila" style="gap:24px;">
      <div class="texto-centrado">
        <p style="font-size:18px; font-weight:600; color:white; margin:0;">+500</p>
        <p style="font-size:12px; color:#EDEDF0; margin:0;">escuelas</p>
      </div>
      <div class="texto-centrado">
        <p style="font-size:18px; font-weight:600; color:white; margin:0;">+20k</p>
        <p style="font-size:12px; color:#EDEDF0; margin:0;">estudiantes</p>
      </div>
    </div>
  </div>

</div>

<script>
  // Simula el registro y lleva directo a la lista de alumnos.
  // Cuando tengas un backend, aquí harías la petición real de registro.
  document.getElementById('formRegistro').addEventListener('submit', function (e) {
    e.preventDefault();
    window.location.href = 'alumnos.html';
  });
</script>

</body>
</html>
